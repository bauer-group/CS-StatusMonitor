# =============================================================================
# Status Monitor (Uptime Kuma) - Single Server Mode (Traefik Reverse Proxy)
# =============================================================================
# Usage: docker compose -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik running on the external ${PROXY_NETWORK} network
#   - DNS: ${SERVICE_HOSTNAME} -> this host
#
# The dashboard is served over HTTPS by Traefik (Let's Encrypt). Uptime Kuma's
# socket.io WebSocket is upgraded transparently over the same HTTP router — no
# extra Traefik configuration is required.
#
# Access:
#   - Dashboard  https://${SERVICE_HOSTNAME}
#
# First start: open the dashboard and complete the setup wizard to create the
# admin account (persisted in the status-monitor-data volume).
# =============================================================================


### Service Templates ###
x-status-monitor-common: &status-monitor-common
  image: ${STATUS_MONITOR_IMAGE:-ghcr.io/bauer-group/cs-statusmonitor/status-monitor}:${STATUS_MONITOR_IMAGE_VERSION:-latest}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  environment:
    - TZ=${TIME_ZONE:-Etc/UTC}
    # Pass-through (no value): unset -> Uptime Kuma binds dual-stack [::] (IPv6 +
    # IPv4) with clean logs. Set UPTIME_KUMA_HOST in .env only to override
    # (e.g. 0.0.0.0 to force IPv4-only). Never set it to an explicit "::".
    - UPTIME_KUMA_HOST
    - UPTIME_KUMA_WS_ORIGIN_CHECK=${UPTIME_KUMA_WS_ORIGIN_CHECK:-cors-like}
    - UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN=${UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN:-false}
  healthcheck:
    test: ["CMD", "extra/healthcheck"]
    interval: 60s
    timeout: 30s
    retries: 5
    start_period: 180s


services:
### Status Monitor ###
  status-monitor:
    <<: *status-monitor-common
    container_name: ${STACK_NAME:-status-monitor}_SERVER
    expose:
      - 3001/tcp
    volumes:
      - status-monitor-data:/app/data
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"

      # ── HTTP -> HTTPS redirect ──────────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-status-monitor}-http.rule=Host(`${SERVICE_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}-http.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}-http.middlewares=${STACK_NAME:-status-monitor}-redirect-to-secure"
      - "traefik.http.middlewares.${STACK_NAME:-status-monitor}-redirect-to-secure.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK_NAME:-status-monitor}-redirect-to-secure.redirectscheme.permanent=true"

      # ── Dashboard — HTTPS ───────────────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-status-monitor}.rule=Host(`${SERVICE_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}.entrypoints=web-secure"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}.tls=true"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-status-monitor}.service=${STACK_NAME:-status-monitor}"
      - "traefik.http.services.${STACK_NAME:-status-monitor}.loadBalancer.server.port=3001"


### Volumes ###
volumes:
  status-monitor-data:
    driver: local
    name: ${STACK_NAME:-status-monitor}-data


### Networks ###
networks:
  proxy:
    name: ${PROXY_NETWORK:-EDGEPROXY}
    external: true
